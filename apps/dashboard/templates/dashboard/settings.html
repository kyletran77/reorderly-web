{% extends "dashboard/base.html" %}
{% block title %}Settings{% endblock %}
{% block content %}
<div class="page-header"><h1 class="page-title">Settings</h1></div>
<div class="form-card">
  <form method="post">
    {% csrf_token %}
    <div class="form-group"><label>Store Name</label><input type="text" name="shop_name" class="input" value="{{ store.shop_name }}"></div>
    <div class="form-group"><label>Shopify Domain</label><input type="text" class="input" value="{{ store.shop_domain }}" disabled></div>
    <div class="form-group"><label>Email</label><input type="text" class="input" value="{{ store.shop_email }}" disabled></div>
    <div class="form-actions"><button type="submit" class="btn btn-primary">Save</button></div>
  </form>
</div>
{% endblock %}
