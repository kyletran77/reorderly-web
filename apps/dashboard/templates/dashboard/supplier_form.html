{% extends "dashboard/base.html" %}
{% block title %}{{ action }}{% endblock %}
{% block content %}
<div class="page-header">
  <div>
    <a href="/app/suppliers/" class="back-link">← Suppliers</a>
    <h1 class="page-title">{{ action }}</h1>
  </div>
</div>
<div class="form-card">
  <form method="post">
    {% csrf_token %}
    <div class="form-grid">
      <div class="form-group"><label>Supplier Name *</label><input type="text" name="name" class="input" value="{{ supplier.name|default:'' }}" required></div>
      <div class="form-group"><label>Email *</label><input type="email" name="email" class="input" value="{{ supplier.email|default:'' }}" required></div>
      <div class="form-group"><label>Contact Name</label><input type="text" name="contact_name" class="input" value="{{ supplier.contact_name|default:'' }}"></div>
      <div class="form-group"><label>Phone</label><input type="text" name="phone" class="input" value="{{ supplier.phone|default:'' }}"></div>
      <div class="form-group"><label>Payment Terms</label>
        <select name="payment_terms" class="input">
          {% for t in "Net 15,Net 30,Net 45,Net 60,Due on Receipt,Prepaid"|split:"," %}
          <option value="{{ t }}" {% if supplier.payment_terms == t %}selected{% endif %}>{{ t }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group"><label>Lead Time (days)</label><input type="number" name="lead_time_days" class="input" value="{{ supplier.lead_time_days|default:14 }}" min="1"></div>
      <div class="form-group"><label>Min Order Qty</label><input type="number" name="minimum_order_qty" class="input" value="{{ supplier.minimum_order_qty|default:1 }}" min="1"></div>
      <div class="form-group"><label>Currency</label>
        <select name="currency" class="input">
          {% for c in "USD,CAD,GBP,EUR,AUD,NZD"|split:"," %}
          <option value="{{ c }}" {% if supplier.currency == c %}selected{% endif %}>{{ c }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group full"><label>Notes</label><textarea name="notes" class="input" rows="3">{{ supplier.notes|default:'' }}</textarea></div>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Save Supplier</button>
      <a href="/app/suppliers/" class="btn btn-ghost">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
